<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伝票データ化システム - モックアップ</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    伝票データ化システム
                </h1>
                <nav class="nav">
                    <button class="nav-btn active">ホーム</button>
                    <button class="nav-btn">履歴</button>
                    <button class="nav-btn">設定</button>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-card">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 class="upload-title">伝票をアップロード</h2>
                    <p class="upload-description">手書きまたは印刷された伝票をスキャンしてアップロードしてください</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*,.pdf" multiple>
                    <label for="fileInput" class="upload-btn">
                        ファイルを選択
                    </label>
                    <p class="upload-hint">または、ここにファイルをドラッグ&ドロップ</p>
                    <div class="supported-formats">
                        <span class="format-badge">JPG</span>
                        <span class="format-badge">PNG</span>
                        <span class="format-badge">PDF</span>
                        <span class="format-badge">TIFF</span>
                    </div>
                </div>
            </section>

            <!-- Processing Section -->
            <section class="processing-section">
                <div class="section-header">
                    <h2 class="section-title">処理中の伝票</h2>
                    <span class="badge">3件</span>
                </div>
                
                <div class="slip-list">
                    <!-- Slip Item 1 -->
                    <div class="slip-item">
                        <div class="slip-preview">
                            <div class="preview-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </div>
                        </div>
                        <div class="slip-info">
                            <h3 class="slip-name">納品伝票_20260121_001.jpg</h3>
                            <div class="slip-meta">
                                <span class="meta-item">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                    2分前
                                </span>
                                <span class="meta-item">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none">
                                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                    1.2 MB
                                </span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 75%"></div>
                                </div>
                                <span class="progress-text">OCR処理中... 75%</span>
                            </div>
                        </div>
                        <div class="slip-actions">
                            <button class="action-btn secondary">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="2"/>
                                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                            <button class="action-btn secondary">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Slip Item 2 - Completed -->
                    <div class="slip-item completed">
                        <div class="slip-preview">
                            <div class="preview-placeholder success">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </div>
                        </div>
                        <div class="slip-info">
                            <h3 class="slip-name">請求書_20260121_002.png</h3>
                            <div class="slip-meta">
                                <span class="meta-item">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                    5分前
                                </span>
                                <span class="meta-item">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none">
                                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                    980 KB
                                </span>
                            </div>
                            <div class="status-badge success">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2"/>
                                </svg>
                                処理完了
                            </div>
                        </div>
                        <div class="slip-actions">
                            <button class="action-btn primary">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke="currentColor" stroke-width="2"/>
                                </svg>
                                PDF出力
                            </button>
                            <button class="action-btn secondary">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Slip Item 3 -->
                    <div class="slip-item">
                        <div class="slip-preview">
                            <div class="preview-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </div>
                        </div>
                        <div class="slip-info">
                            <h3 class="slip-name">受領書_20260121_003.jpg</h3>
                            <div class="slip-meta">
                                <span class="meta-item">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                    たった今
                                </span>
                                <span class="meta-item">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none">
                                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                                    </svg>
                                    1.5 MB
                                </span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 25%"></div>
                                </div>
                                <span class="progress-text">画像解析中... 25%</span>
                            </div>
                        </div>
                        <div class="slip-actions">
                            <button class="action-btn secondary">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="2"/>
                                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                            <button class="action-btn secondary">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">今月の処理数</p>
                        <p class="stat-value">127<span class="stat-unit">件</span></p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">認識精度</p>
                        <p class="stat-value">98.5<span class="stat-unit">%</span></p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon purple">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">平均処理時間</p>
                        <p class="stat-value">2.3<span class="stat-unit">分</span></p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
